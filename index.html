<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind Css</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="./output.css" rel="stylesheet">
</head>

<body class=" bg-gray-200 min-h-screen  flex justify-center items-center p-4 ">
  <div class="flex w-[700px]rounded-xl shadow-2xl overflow-hidden  rounded-3xl w-full max-w-4xl flex-col md:flex-row">
    <!-- left -->
    <div class="w-full md:w-1/2 p-8 md:p-12 bg-white  ">
      <h1 class="flex justify-center items-center font-bold text-3xl pt-32 mb-6 ">S'identifer</h1>
      <form class="p-2 m-1 space-y-4 ">
        <input type="Email" id="Email" placeholder="Email"
          class="border focus:outline-none mb-2 p-1.5 w-full px-4 py-3  bg-gray-100 border-none  "><br>
        <input type="password" id="Password" placeholder="Password"
          class="w-full mb-4 px-4 py-2 border focus:outline-none bg-gray-100 border-none"><br>
      </form>
      <p class="pl-24 text-sm text-gray-500 pt-14 cursor-pointer hover:underline ">Mot de passe oubiler</p>
      <button class="btn1 border-2 rounded-4xl p-1.5 m-9 bg-orange-600 text-amber-50 w-3xs mb-11">S'IDENTIFIER</button>

    </div>
    <!-- right -->
    <div class="  bg-gradient-to- from-pink-500 to bg-pink-600 text-white w-full md:w-1/2 flex-col item-center">
      <h2 class="flex justify-center items-center font-bold text-3xl pt-36  mt-7 md:text-4xl mb-4 ">Salut I ami!</h2>
      <p class="flex justify-center items-center mb-6 text-sm md:text-base opacity-90">Enter vos donnees personnelles et <br>commencer votre voyage avec nous
      </p>
      <button class="btn1 border-2  px-8 py-3  hover:bg-white hover:text-pink-600 rounded-4xl p-3  m-9  w-3xs  ">S'INSCRIRER</button>
    </div>
  </div>
  </div>
  </div>
</body>

</html>
